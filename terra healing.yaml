name: 🌍 Terra Healing System - Automatic Activation

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:  # Manual trigger

jobs:
  terra-healing-main:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'
    
    - name: 🌍 Run Main Terra System
      run: |
        timeout 60 python3 main.py || true
    
    - name: 🌍 Run Extended Terra System
      run: |
        timeout 60 python3 terra_system.py || true
    
    - name: 🎥 Run YouTube Integration
      run: |
        timeout 60 python3 youtube_integration.py || true
    
    - name: 📊 Generate Status Report
      run: |
        echo "✅ Terra Healing System Activation Complete"
        echo "🌍 Planetary Status Updated"
        echo "❤️ Global Healing Cycles Running"
        echo "Activation Time: $(date)" >> ACTIVATION_LOG.txt
    
    - name: 📤 Commit Results
      run: |
        git config --global user.name "Terra Healing Bot"
        git config --global user.email "healing@earth"
        git add ACTIVATION_LOG.txt || true
        git commit -m "🌍 Terra System Activation - $(date +%Y-%m-%d\ %H:%M:%S)" || echo "No changes"
        git push || echo "Nothing to push"

  notification:
    runs-on: ubuntu-latest
    needs: terra-healing-main
    if: always()
    
    steps:
    - name: ✅ Activation Complete
      run: |
        echo "🌍 Terra Healing System automatically activated"
        echo "📊 All systems operational"
        echo "❤️ The planet is healing"
